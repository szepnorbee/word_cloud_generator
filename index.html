<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordCloud Pro V3.5 - GitHub Pages Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .canvas-container {
            background-image: url('https://www.transparenttextures.com/patterns/white-diamond.png');
        }
        input[type="range"] { accent-color: #0d9488; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Egyszerűsített ikon komponensek - Javítva: a több elemből álló SVG-k töredékbe (<>...</>) lettek csomagolva
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5m-5-5v12"/>,
                refresh: <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"/>,
                image: (
                    <>
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
                        <circle cx="9" cy="9" r="2"/>
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
                    </>
                ),
                settings: (
                    <>
                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </>
                ),
                info: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 16v-4"/>
                        <path d="M12 8h.01"/>
                    </>
                ),
                type: (
                    <>
                        <polyline points="4 7 4 4 20 4 20 7"/>
                        <line x1="9" y1="20" x2="15" y2="20"/>
                        <line x1="12" y1="4" x2="12" y2="20"/>
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [image, setImage] = useState(null);
            const [words, setWords] = useState("Mycotoxins, Aflatoxin, Ochratoxin, Deoxynivalenol, DON, Zearalenone, Fumonisin, T-2, HT-2, Patulin, Ergot Alkaloids, Food Allergens, Gluten-free, Lactose, Pathogens, Salmonella, Listeria, E. coli, Campylobacter, GMO, Genetically Modified Organisms, Drug Residues, Antibiotics, Vitamins, Diagnostics, Immunoassay, ELISA, Lateral Flow Device, LFD, Strip Test, Rapid Testing, Reference Materials, Clean-up Columns, Immunoaffinity Columns, IAC, Solid Phase Extraction, SPE, LC-MS/MS, HPLC, Quantitative Analysis, Qualitative Screening, Point-of-Need Testing, On-site Analysis, Sample Preparation, Milling, Grinding, Extraction, Incubation, Food Safety, Feed Safety, Consumer Protection, Regulatory Compliance, HACCP, Laboratory Services, Analytical Excellence, Validation, Proficiency Testing, Standardization, Traceability, Supply Chain Integrity, Quality Control, QC, Quality Assurance, QA, LOD, Limit of Detection, LOQ, Limit of Quantitation, Matrix-matched, ISO Accreditation, AgraStrip, AgraQuant, MycoSep, MultiSep, Star-E, CytoQuant, Biopure, Ergotop, Innovation, Reliability, Accuracy, Precision, Detection, Prevention, Science, Expertise, Global Network, Sustainability, Public Health, Diagnostic Solutions, Making the World’s Food Safer, Total Quality Management, Advanced Diagnostic Solutions, Leading Technology, Ensuring Product Integrity, Representative Sampling, Cross-reactivity, Troubleshooting, Analytical Workflows");
            const [isGenerating, setIsGenerating] = useState(false);
            const [imageColors, setImageColors] = useState(['#0f766e', '#134e4a', '#2dd4bf', '#064e3b', '#115e59']);
            const [progress, setProgress] = useState(0);
            
            const [config, setConfig] = useState({
                minFontSize: 5,
                maxFontSize: 55,
                fontFamily: 'system-ui, sans-serif',
                padding: 1,
                rotate: true,
                densityMultiplier: 2.5,
                backgroundVisible: false,
                contrastThreshold: 240
            });

            const canvasRef = useRef(null);
            const maskCanvasRef = useRef(null);
            const fileInputRef = useRef(null);

            const extractColors = (img) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                const colors = {};
                for (let i = 0; i < data.length; i += 150) {
                    if (data[i+3] > 180 && (data[i] < 230 || data[i+1] < 230 || data[i+2] < 230)) {
                        const hex = `#${((1 << 24) + (data[i] << 16) + (data[i+1] << 8) + data[i+2]).toString(16).slice(1)}`;
                        colors[hex] = (colors[hex] || 0) + 1;
                    }
                }
                const topColors = Object.entries(colors).sort((a, b) => b[1] - a[1]).slice(0, 8).map(c => c[0]);
                if (topColors.length > 0) setImageColors(topColors);
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        setImage(img);
                        extractColors(img);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const downloadCanvas = () => {
                if (!canvasRef.current) return;
                const canvas = canvasRef.current;
                const link = document.createElement('a');
                link.download = 'wordcloud_export.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const generateWordCloud = async () => {
                if (!image || !canvasRef.current) return;
                setIsGenerating(true);
                setProgress(0);

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                const maskCanvas = maskCanvasRef.current;
                const mctx = maskCanvas.getContext('2d', { willReadFrequently: true });

                const width = 1200;
                const scale = width / image.width;
                canvas.width = width;
                canvas.height = image.height * scale;
                maskCanvas.width = canvas.width;
                maskCanvas.height = canvas.height;

                mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
                mctx.drawImage(image, 0, 0, maskCanvas.width, maskCanvas.height);
                const maskData = mctx.getImageData(0, 0, maskCanvas.width, maskCanvas.height).data;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (config.backgroundVisible) {
                    ctx.globalAlpha = 0.03;
                    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
                    ctx.globalAlpha = 1.0;
                }

                const wordList = words.split(/[,|\n]+/).map(w => w.trim()).filter(w => w.length > 0);
                const sortedWords = wordList.sort((a, b) => b.length - a.length);

                const isPointInMask = (x, y) => {
                    if (x < 0 || x >= maskCanvas.width || y < 0 || y >= maskCanvas.height) return false;
                    const idx = (Math.floor(y) * maskCanvas.width + Math.floor(x)) * 4;
                    return maskData[idx + 3] > 100 && (maskData[idx] < config.contrastThreshold || maskData[idx+1] < config.contrastThreshold || maskData[idx+2] < config.contrastThreshold);
                };

                const placedWords = [];

                const findPosition = (text, fontSize, rotate) => {
                    ctx.font = `bold ${fontSize}px ${config.fontFamily}`;
                    const metrics = ctx.measureText(text);
                    const w = metrics.width + config.padding * 2;
                    const h = fontSize + config.padding * 2;

                    let startX = canvas.width / 2;
                    let startY = canvas.height / 2;

                    let angle = 0;
                    let radius = 0;
                    const maxRadius = Math.max(canvas.width, canvas.height);
                    
                    while (radius < maxRadius) {
                        const x = startX + radius * Math.cos(angle);
                        const y = startY + radius * Math.sin(angle);

                        if (x > 0 && x < canvas.width && y > 0 && y < canvas.height) {
                            const bounds = {
                                x: x - (rotate ? h/2 : w/2),
                                y: y - (rotate ? w/2 : h/2),
                                w: rotate ? h : w,
                                h: rotate ? w : h
                            };

                            const overlaps = placedWords.some(other => {
                                return !(bounds.x + bounds.w < other.x || 
                                        bounds.x > other.x + other.w || 
                                        bounds.y + bounds.h < other.y || 
                                        bounds.y > other.y + other.h);
                            });

                            if (!overlaps) {
                                const checkStep = Math.max(4, fontSize / 4);
                                let fits = true;
                                for (let px = bounds.x; px <= bounds.x + bounds.w; px += checkStep) {
                                    for (let py = bounds.y; py <= bounds.y + bounds.h; py += checkStep) {
                                        if (!isPointInMask(px, py)) { fits = false; break; }
                                    }
                                    if (!fits) break;
                                }
                                if (fits) return { x, y, bounds };
                            }
                        }
                        angle += 0.25;
                        radius += 0.18;
                    }
                    return null;
                };

                const totalWordsToTry = Math.floor(sortedWords.length * config.densityMultiplier);
                
                for (let i = 0; i < totalWordsToTry; i++) {
                    const text = sortedWords[i % sortedWords.length];
                    let fontSize;
                    if (i < totalWordsToTry * 0.2) {
                        fontSize = Math.floor(config.maxFontSize * (1 - (i / (totalWordsToTry * 0.2)) * 0.4));
                    } else if (i < totalWordsToTry * 0.6) {
                        fontSize = Math.floor(config.maxFontSize * 0.5 * (1 - ((i - totalWordsToTry * 0.2) / (totalWordsToTry * 0.4)) * 0.5));
                    } else {
                        fontSize = Math.max(config.minFontSize, Math.floor(config.maxFontSize * 0.15));
                    }
                    
                    const rotate = config.rotate && Math.random() > 0.8;
                    const pos = findPosition(text, fontSize, rotate);

                    if (pos) {
                        ctx.save();
                        ctx.translate(pos.x, pos.y);
                        if (rotate) ctx.rotate(Math.PI / 2);
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = imageColors[Math.floor(Math.random() * imageColors.length)];
                        ctx.font = `bold ${fontSize}px ${config.fontFamily}`;
                        ctx.fillText(text, 0, 0);
                        ctx.restore();
                        placedWords.push(pos.bounds);
                    }

                    if (i % 20 === 0) {
                        setProgress(Math.round((i / totalWordsToTry) * 100));
                        await new Promise(r => setTimeout(r, 0));
                    }
                }
                setIsGenerating(false);
                setProgress(100);
            };

            return (
                <div className="p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex flex-col xl:flex-row gap-8">
                            {/* KONFIGURÁCIÓ */}
                            <div className="w-full xl:w-[400px] space-y-6">
                                <div className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                                    <div className="bg-gradient-to-r from-teal-800 to-teal-600 p-6 text-white text-center">
                                        <h1 className="text-2xl font-black tracking-tight">WordCloud Pro <span className="font-light">V3.5</span></h1>
                                        <p className="text-teal-100 text-[10px] mt-1 font-bold uppercase tracking-widest">GitHub Pages Version</p>
                                    </div>

                                    <div className="p-6 space-y-6">
                                        {/* 1. Alakzat */}
                                        <div className="space-y-3">
                                            <label className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <Icon name="image" size={14} /> 1. Alakzat
                                            </label>
                                            <div 
                                                onClick={() => fileInputRef.current.click()}
                                                className={`border-2 border-dashed rounded-2xl p-6 text-center cursor-pointer transition-all ${image ? 'border-teal-500 bg-teal-50' : 'border-slate-200'}`}
                                            >
                                                <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                                                {image ? (
                                                    <div className="flex items-center gap-4 text-left">
                                                        <img src={image.src} className="w-12 h-12 object-contain bg-white rounded-lg p-1 border" />
                                                        <div>
                                                            <p className="text-sm font-bold text-teal-900 leading-none">Logó betöltve</p>
                                                            <p className="text-[10px] text-teal-500 mt-1 uppercase font-bold">Kattints a cseréhez</p>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <div className="py-2">
                                                        <Icon name="upload" className="mx-auto text-slate-300 mb-2" size={28} />
                                                        <p className="text-xs font-bold text-slate-500">Logó feltöltése</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* 2. Szavak */}
                                        <div className="space-y-3">
                                            <label className="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                                <Icon name="type" size={14} /> 2. Szókészlet
                                            </label>
                                            <textarea
                                                value={words}
                                                onChange={(e) => setWords(e.target.value)}
                                                className="w-full h-40 p-4 text-xs border border-slate-200 rounded-2xl focus:ring-2 focus:ring-teal-500 outline-none font-medium bg-slate-50"
                                            />
                                        </div>

                                        {/* 3. Beállítások */}
                                        <div className="space-y-4 pt-4 border-t">
                                            <div className="flex justify-between items-center text-[10px] font-black text-slate-500 uppercase">
                                                <span>Betűméret</span>
                                                <span className="text-teal-600">{config.maxFontSize}px</span>
                                            </div>
                                            <input type="range" min="20" max="100" value={config.maxFontSize} 
                                                onChange={(e) => setConfig({...config, maxFontSize: parseInt(e.target.value)})}
                                                className="w-full"
                                            />

                                            <div className="flex justify-between items-center text-[10px] font-black text-slate-500 uppercase">
                                                <span>Sűrűség</span>
                                                <span className="text-teal-600">x{config.densityMultiplier}</span>
                                            </div>
                                            <input type="range" min="1" max="5" step="0.5" value={config.densityMultiplier} 
                                                onChange={(e) => setConfig({...config, densityMultiplier: parseFloat(e.target.value)})}
                                                className="w-full"
                                            />
                                            
                                            <div className="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                                                <span className="text-[10px] font-black text-slate-500 uppercase">Forgatás</span>
                                                <button onClick={() => setConfig({...config, rotate: !config.rotate})} className={`w-10 h-5 rounded-full relative ${config.rotate ? 'bg-teal-600' : 'bg-slate-300'}`}>
                                                    <div className={`absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all ${config.rotate ? 'left-5.5' : 'left-0.5'}`} />
                                                </button>
                                            </div>
                                        </div>

                                        <button
                                            onClick={generateWordCloud}
                                            disabled={!image || isGenerating}
                                            className={`w-full py-4 rounded-2xl font-black text-xs tracking-widest text-white shadow-xl transition-all ${!image || isGenerating ? 'bg-slate-300' : 'bg-teal-600 hover:bg-teal-700'}`}
                                        >
                                            {isGenerating ? `GENERÁLÁS: ${progress}%` : "SZÓFELHŐ LÉTREHOZÁSA"}
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* VÁSZON */}
                            <div className="flex-1 space-y-4">
                                <div className="bg-white rounded-[40px] shadow-2xl border border-slate-200 p-8 min-h-[700px] flex flex-col items-center justify-center relative canvas-container overflow-hidden">
                                    {isGenerating && (
                                        <div className="absolute inset-0 bg-white/80 backdrop-blur-md z-20 flex flex-col items-center justify-center">
                                            <div className="w-64 h-2 bg-slate-100 rounded-full overflow-hidden mb-4">
                                                <div className="h-full bg-teal-600" style={{ width: `${progress}%` }} />
                                            </div>
                                            <p className="text-[10px] font-black text-teal-800 uppercase tracking-widest">Számítás folyamatban...</p>
                                        </div>
                                    )}

                                    {!image ? (
                                        <div className="text-center opacity-30">
                                            <Icon name="image" size={60} className="mx-auto mb-4" />
                                            <p className="font-bold">Várjuk az alakzatot...</p>
                                        </div>
                                    ) : (
                                        <canvas ref={canvasRef} className="max-w-full h-auto rounded-xl drop-shadow-2xl" />
                                    )}

                                    <canvas ref={maskCanvasRef} className="hidden" />

                                    {image && !isGenerating && (
                                        <div className="absolute bottom-6 right-6 flex gap-2">
                                            <button onClick={() => setConfig({...config, backgroundVisible: !config.backgroundVisible})} className={`p-3 rounded-xl border shadow-md ${config.backgroundVisible ? 'bg-teal-600 text-white' : 'bg-white text-slate-600'}`}>
                                                <Icon name="image" size={20} />
                                            </button>
                                            <button onClick={downloadCanvas} className="p-3 bg-teal-900 text-white rounded-xl shadow-md hover:bg-black">
                                                <Icon name="download" size={20} />
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
